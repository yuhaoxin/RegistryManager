name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CI: true
  CARGO_NET_RETRY: 10
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      # Tauri Linux builds require WebKitGTK, GTK, AppIndicator, librsvg, and patchelf.
      # Keep this explicit so Ubuntu failures point to desktop runtime prerequisites.
      - name: Install Linux web build prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Allow required pnpm build dependencies
        run: pnpm config set onlyBuiltDependencies esbuild

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rust format check
        run: cargo fmt --all --check

      - name: Rust lint check
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Frontend typecheck
        run: pnpm exec tsc --noEmit

      - name: Rust tests
        run: cargo test

      - name: Frontend unit tests
        run: pnpm vitest run

      - name: Frontend build and typecheck
        run: pnpm build

  e2e:
    name: E2E / Docker QA
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Allow required pnpm build dependencies
        run: pnpm config set onlyBuiltDependencies esbuild

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start disposable registry fixture for Docker-backed QA
        run: docker compose -f docker-compose.test.yml up -d registry

      - name: Wait for registry fixture
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://localhost:5001/v2/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker compose -f docker-compose.test.yml logs registry
          exit 1

      # Local equivalent for real-service Rust tests:
      # docker compose -f docker-compose.test.yml up -d registry && cargo test -- --ignored
      - name: Real-registry Rust QA tests
        run: cargo test -- --ignored

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright E2E tests
        run: pnpm playwright test

      - name: Stop disposable registry fixture
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            playwright-report/
            .sisyphus/evidence/task-9-*.png
            .sisyphus/evidence/task-9-*.zip
          if-no-files-found: ignore

      - name: Upload Playwright traces and screenshots
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-test-results
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore
